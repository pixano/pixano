name: Docker

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "src/pixano/**"
      - "ui/**"
      - ".github/workflows/docker.yml"
      - "pyproject.toml"
  pull_request:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".github/workflows/docker.yml"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: pixano/pixano:test

      - name: Test container
        run: |
          docker run -p 7492:7492 --name pixano -d pixano/pixano:test
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7492/health > /dev/null 2>&1; then
              echo "Server is up after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start within 30s"
              docker logs pixano
              docker rm -f pixano
              exit 1
            fi
            sleep 1
          done
          RESPONSE=$(curl -sf http://localhost:7492/health)
          echo "Health check response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"'
          echo "Test passed"
          docker rm -f pixano

  publish:
    name: Publish
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: pixano/pixano:latest
