name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish_pypi:
    name: PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js 23
        uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Setup pnpm 10.4.1
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Build package
        run: uv build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1

  publish_docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-astro/package-lock.json

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --group docs

      - name: Install Node dependencies
        run: npm ci
        working-directory: docs-astro

      - name: Generate API reference
        run: uv run python docs-astro/scripts/generate_api_docs.py

      - name: Build Astro site
        run: npx astro build
        working-directory: docs-astro

      - name: Run Pagefind
        run: npx pagefind --site dist
        working-directory: docs-astro

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-astro/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish_docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set VERSION environment variable
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            pixano/pixano:${{ env.VERSION }}
            ${{ github.event.release.prerelease == false && 'pixano/pixano:stable' || '' }}
